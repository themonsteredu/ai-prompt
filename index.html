<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI프롬프트 어디까지 해봤니</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">AI</span>
          <div>
            <h1>AI프롬프트 어디까지 해봤니</h1>
            <p>짧게 배우고, 직접 써보고, 힌트로 다시 도전해요.</p>
          </div>
        </div>
        <button class="quiet-button" id="resetButton" type="button">처음부터</button>
      </header>

      <section class="status-bar" aria-label="학습 현황">
        <div>
          <span id="stageLabel">튜토리얼</span>
          <strong id="stageTitle">좋은 질문의 기본</strong>
        </div>
        <div class="score-box">
          <span>점수</span>
          <strong id="scoreText">0점</strong>
        </div>
      </section>

      <nav class="step-tabs" id="stepTabs" aria-label="단계"></nav>

      <section class="card" id="card" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
